<!DOCTYPE html>
<html>
<head>
<title>Smart Trolley Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
input,button{
  padding:10px;
  margin:5px;
}
table{
  margin:auto;
  border-collapse:collapse;
  width:70%;
}
td,th{
  border:1px solid white;
  padding:8px;
}
button{
  background:#22c55e;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>Smart Trolley Billing</h1>

<input id="billCode" placeholder="Enter Bill Code"><br>
<button id="showBtn">Show Bill</button>

<table id="billTable">
<tr>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
</tr>
</table>

<h2 id="total">Total ₹0</h2>

<button id="payBtn">Pay Now</button>
<button id="pdfBtn">Download Bill</button>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbOouftPpbrErEtrfO_cWhXLrDYC6ysjA",
  databaseURL: "https://smarttrolly-80316-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let totalAmount = 0;
let activeTrolley = "";
let billItems = [];

// ---------- SHOW BILL ----------
document.getElementById("showBtn").onclick = async () => {

  const codeInput = document.getElementById("billCode").value.trim();
  if(!codeInput){ alert("Enter Bill Code"); return; }

  const tSnap = await get(ref(db,"trolleys"));
  if(!tSnap.exists()){ alert("No Data"); return; }

  activeTrolley = "";
  billItems = [];
  totalAmount = 0;

  tSnap.forEach(child=>{
    const d = child.val();
    if(d.billCode && String(d.billCode).trim() === codeInput){
      activeTrolley = child.key;
    }
  });

  if(activeTrolley === ""){
    alert("Invalid Bill Code");
    return;
  }

  const snap = await get(ref(db,"trolleys/"+activeTrolley+"/items"));

  const table = document.getElementById("billTable");
  table.innerHTML="<tr><th>Product</th><th>Qty</th><th>Amount</th></tr>";

  if(!snap.exists()){ alert("No Items"); return; }

  for (const [barcode, d] of Object.entries(snap.val())) {

    const nameSnap = await get(ref(db,"products/"+barcode+"/name"));
    const priceSnap = await get(ref(db,"products/"+barcode+"/price"));

    let name = nameSnap.exists()? nameSnap.val() : "Item";
    let price = priceSnap.exists()? priceSnap.val() : 0;

    const qty = d.qty || 0;
    const line = qty * price;
    totalAmount += line;

    billItems.push({name, qty, line});

    const row = document.createElement("tr");
    row.innerHTML =
      "<td>"+name+"</td>"+
      "<td>"+qty+"</td>"+
      "<td>"+line+"</td>";

    table.appendChild(row);
  }

  document.getElementById("total").innerText="Total ₹"+totalAmount;
};

// ---------- PDF DOWNLOAD ----------
document.getElementById("pdfBtn").onclick = () => {

  if(billItems.length === 0){
    alert("Generate Bill First");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 20;
  doc.setFontSize(18);
  doc.text("SMART TROLLEY BILL", 55, y);

  y += 10;
  doc.setFontSize(10);
  doc.text("Date: " + new Date().toLocaleString(), 10, y);

  y += 10;
  doc.line(10, y, 200, y);

  y += 10;
  doc.text("Product", 10, y);
  doc.text("Qty", 100, y);
  doc.text("Amount", 150, y);

  y += 5;
  doc.line(10, y, 200, y);

  billItems.forEach(item => {
    y += 10;
    doc.text(item.name, 10, y);
    doc.text(String(item.qty), 100, y);
    doc.text("Rs " + item.line, 150, y);
  });

  y += 15;
  doc.line(10, y, 200, y);

  y += 10;
  doc.setFontSize(14);
  doc.text("TOTAL: Rs " + totalAmount, 130, y);

  y += 15;
  doc.setFontSize(12);
  doc.text("Thank You! Visit Again", 60, y);

  doc.save("SmartTrolleyBill.pdf");
};

// ---------- PAYMENT ----------
document.getElementById("payBtn").onclick = async () => {

  if(activeTrolley === ""){
    alert("No Active Bill");
    return;
  }

  alert("Payment Successful");

  await set(ref(db,"trolleys/"+activeTrolley+"/items"), "");
  await set(ref(db,"trolleys/"+activeTrolley+"/total"), 0);
  await set(ref(db,"trolleys/"+activeTrolley+"/billCode"), "");
  await set(ref(db,"trolleys/"+activeTrolley+"/status"), "shopping");

  document.getElementById("billTable").innerHTML="";
  document.getElementById("total").innerText="Total ₹0";
};
</script>

</body>
</html>
