<!DOCTYPE html>
<html>
<head>
<title>Smart Trolley Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

input,button{
  padding:10px;
  margin:5px;
}

table{
  margin:auto;
  border-collapse:collapse;
  width:80%;
}

td,th{
  border:1px solid white;
  padding:8px;
}

button{
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
}

#showBtn{background:#22c55e;}
#payBtn{background:#2563eb;}
#pdfBtn{background:#f59e0b;}
</style>
</head>

<body>

<h1>Smart Trolley Billing</h1>

<input id="billCode" placeholder="Enter Bill Code"><br>
<button id="showBtn">Show Bill</button>

<table id="billTable">
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Amount</th>
</tr>
</table>

<h2 id="total">Total ₹0</h2>

<button id="payBtn">Pay Now</button>
<button id="pdfBtn">Download Bill</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbOouftPpbrErEtrfO_cWhXLrDYC6ysjA",
  databaseURL: "https://smarttrolly-80316-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let totalAmount = 0;
let activeTrolley = "";
let billItems = [];

document.getElementById("showBtn").onclick = async () => {

  const codeInput = document.getElementById("billCode").value.trim();

  if(!codeInput){
    alert("Enter Bill Code");
    return;
  }

  const tSnap = await get(ref(db,"trolleys"));

  if(!tSnap.exists()){
    alert("No Data");
    return;
  }

  activeTrolley="";
  totalAmount=0;
  billItems=[];

  tSnap.forEach(child=>{
    const d=child.val();

    if(d.billCode && String(d.billCode).trim()===codeInput){
      activeTrolley=child.key;
    }
  });

  if(activeTrolley===""){
    alert("Invalid Bill Code");
    return;
  }

  const snap = await get(ref(db,"trolleys/"+activeTrolley+"/items"));

  const table = document.getElementById("billTable");

  table.innerHTML="<tr><th>Product</th><th>Qty</th><th>Price</th><th>Amount</th></tr>";

  if(!snap.exists()){
    alert("No Items");
    return;
  }

  for(const [barcode,d] of Object.entries(snap.val())){

    const nameSnap = await get(ref(db,"products/"+barcode+"/name"));
    const priceSnap = await get(ref(db,"products/"+barcode+"/price"));

    let name=nameSnap.exists()?nameSnap.val():"Item";
    let price=priceSnap.exists()?priceSnap.val():0;

    const qty=d.qty||0;
    const line=qty*price;

    totalAmount+=line;

    billItems.push({name,qty,price,line});

    const row=document.createElement("tr");

    row.innerHTML=
    "<td>"+name+"</td>"+
    "<td>"+qty+"</td>"+
    "<td>"+price+"</td>"+
    "<td>"+line+"</td>";

    table.appendChild(row);
  }

  document.getElementById("total").innerText="Total ₹"+totalAmount;

};

document.getElementById("pdfBtn").onclick=()=>{

if(billItems.length===0){
alert("Generate Bill First");
return;
}

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let y=15;

doc.setFontSize(22);
doc.setFont(undefined,"bold");
doc.text("MANOJ MART",105,y,{align:"center"});

y+=7;

doc.setFontSize(10);
doc.setFont(undefined,"normal");
doc.text("Arcot Road, Vellore District",105,y,{align:"center"});

y+=5;

doc.text("Phone: 6379793036",105,y,{align:"center"});

y+=10;

doc.setLineWidth(0.5);
doc.line(10,y,200,y);

y+=8;

doc.setFontSize(14);
doc.text("SMART TROLLEY BILL",105,y,{align:"center"});

y+=8;

doc.setFontSize(10);

doc.text("Date: "+new Date().toLocaleString(),10,y);

const billNo=Math.floor(Math.random()*90000)+10000;
doc.text("Bill No: "+billNo,150,y);

y+=8;

doc.line(10,y,200,y);

y+=6;

doc.setFont(undefined,"bold");

doc.text("Product",10,y);
doc.text("Qty",95,y);
doc.text("Price",125,y);
doc.text("Amount",165,y);

y+=4;
doc.line(10,y,200,y);

doc.setFont(undefined,"normal");

let totalQty=0;

billItems.forEach(item=>{

y+=8;

doc.text(item.name,10,y);
doc.text(String(item.qty),95,y);
doc.text("Rs "+item.price,125,y);
doc.text("Rs "+item.line,165,y);

totalQty+=item.qty;

});

y+=10;
doc.line(10,y,200,y);

y+=8;

doc.text("Total Items: "+totalQty,10,y);

doc.setFont(undefined,"bold");
doc.setFontSize(12);

doc.text("TOTAL: Rs "+totalAmount,150,y);

y+=12;

doc.setFontSize(10);
doc.setFont(undefined,"normal");

doc.text("Thank you for shopping with us!",105,y,{align:"center"});

doc.save("SmartTrolleyBill.pdf");

};

document.getElementById("payBtn").onclick=async()=>{

if(activeTrolley===""){
alert("No Active Bill");
return;
}

alert("Payment Successful");

await set(ref(db,"trolleys/"+activeTrolley+"/items"),"");
await set(ref(db,"trolleys/"+activeTrolley+"/total"),0);
await set(ref(db,"trolleys/"+activeTrolley+"/billCode"),"");
await set(ref(db,"trolleys/"+activeTrolley+"/status"),"shopping");

document.getElementById("billTable").innerHTML="<tr><th>Product</th><th>Qty</th><th>Price</th><th>Amount</th></tr>";

document.getElementById("total").innerText="Total ₹0";

};

</script>

</body>
</html>
